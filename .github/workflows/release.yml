name: Signed release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic release version
        required: true
      min_version:
        description: Oldest Community version supported by this release
        required: false

permissions:
  contents: read

concurrency:
  group: hqbase-community-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 20
    env:
      BETTER_AUTH_SECRET: ci-auth-secret-not-used-in-production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm deploy:dry-run
      - name: Verify release credentials
        env:
          HQBASE_RELEASE_PRIVATE_KEY: ${{ secrets.HQBASE_RELEASE_PRIVATE_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: test -n "$HQBASE_RELEASE_PRIVATE_KEY" && test -n "$CLOUDFLARE_API_TOKEN" && test -n "$CLOUDFLARE_ACCOUNT_ID"
      - name: Verify checked-in release version
        env:
          HQBASE_RELEASE_VERSION: ${{ inputs.version }}
        run: |
          release_version="${HQBASE_RELEASE_VERSION#v}"
          package_version=$(node -p "require('./package.json').version")
          test "$release_version" = "$package_version"
      - name: Package and sign
        env:
          HQBASE_RELEASE_PRIVATE_KEY: ${{ secrets.HQBASE_RELEASE_PRIVATE_KEY }}
          HQBASE_RELEASE_VERSION: ${{ inputs.version }}
          HQBASE_MIN_VERSION: ${{ inputs.min_version }}
        run: |
          export HQBASE_RELEASE_VERSION="${HQBASE_RELEASE_VERSION#v}"
          pnpm release:package
      - name: Refuse to overwrite an immutable artifact
        id: immutable-artifact
        env:
          HQBASE_RELEASE_VERSION: ${{ inputs.version }}
        run: |
          release_version="${HQBASE_RELEASE_VERSION#v}"
          status=$(curl --silent --show-error \
            --output /tmp/existing-community-release.tar.gz \
            --write-out '%{http_code}' \
            "https://billing.hqbase.io/v1/releases/community/${release_version}/artifact")
          case "$status" in
            200)
              curl --fail --silent --show-error \
                https://billing.hqbase.io/v1/releases/community/stable \
                --output /tmp/existing-community-stable.json
              node --input-type=module -e '
                import { createHash, createPublicKey, verify } from "node:crypto";
                import { readFileSync, statSync } from "node:fs";
                const version = process.env.HQBASE_RELEASE_VERSION.replace(/^v/, "");
                const envelope = JSON.parse(readFileSync("/tmp/existing-community-stable.json", "utf8"));
                const key = createPublicKey({ key: Buffer.from("MCowBQYDK2VwAyEAsVwKniCvpHDwbbnjTPP0SuIIG97cRL+iFBQvay9OrU4=", "base64"), format: "der", type: "spki" });
                if (!verify(null, Buffer.from(envelope.payload, "base64url"), key, Buffer.from(envelope.signature, "base64url"))) process.exit(1);
                const payload = JSON.parse(Buffer.from(envelope.payload, "base64url").toString("utf8"));
                const file = "/tmp/existing-community-release.tar.gz";
                const sha256 = createHash("sha256").update(readFileSync(file)).digest("hex");
                if (payload.edition !== "community" || payload.version !== version || payload.artifact?.sha256 !== sha256 || payload.artifact?.size !== statSync(file).size) process.exit(1);
              '
              echo "exists=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Community artifact lookup returned HTTP ${status}" >&2
              exit 1
              ;;
          esac
      - name: Publish immutable artifact and stable manifest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          HQBASE_RELEASE_VERSION: ${{ inputs.version }}
          HQBASE_ARTIFACT_EXISTS: ${{ steps.immutable-artifact.outputs.exists }}
        run: |
          export HQBASE_RELEASE_VERSION="${HQBASE_RELEASE_VERSION#v}"
          if [ "$HQBASE_ARTIFACT_EXISTS" != "true" ]; then
            pnpm exec wrangler r2 object put "hqbase-releases/artifacts/community/${HQBASE_RELEASE_VERSION}.tar.gz" --file "release/community-${HQBASE_RELEASE_VERSION}.tar.gz" --remote
            pnpm exec wrangler r2 object put "hqbase-releases/manifests/community/stable.json" --file release/stable.json --remote
          fi
      - name: Verify published artifact and signed manifest
        env:
          HQBASE_RELEASE_VERSION: ${{ inputs.version }}
          HQBASE_ARTIFACT_EXISTS: ${{ steps.immutable-artifact.outputs.exists }}
        run: |
          release_version="${HQBASE_RELEASE_VERSION#v}"
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              "https://billing.hqbase.io/v1/releases/community/${release_version}/artifact" \
              --output /tmp/published-community.tar.gz; then
              break
            fi
            test "$attempt" -lt 30
            sleep 2
          done
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              https://billing.hqbase.io/v1/releases/community/stable \
              --output /tmp/live-community-stable.json; then
              break
            fi
            test "$attempt" -lt 30
            sleep 2
          done
          node --input-type=module -e '
            import { createHash, createPublicKey, verify } from "node:crypto";
            import { readFileSync, statSync } from "node:fs";
            const envelope = JSON.parse(readFileSync("/tmp/live-community-stable.json", "utf8"));
            const key = createPublicKey({ key: Buffer.from("MCowBQYDK2VwAyEAsVwKniCvpHDwbbnjTPP0SuIIG97cRL+iFBQvay9OrU4=", "base64"), format: "der", type: "spki" });
            if (!verify(null, Buffer.from(envelope.payload, "base64url"), key, Buffer.from(envelope.signature, "base64url"))) process.exit(1);
            const payload = JSON.parse(Buffer.from(envelope.payload, "base64url").toString("utf8"));
            const version = process.env.HQBASE_RELEASE_VERSION.replace(/^v/, "");
            const file = "/tmp/published-community.tar.gz";
            const sha256 = createHash("sha256").update(readFileSync(file)).digest("hex");
            if (payload.edition !== "community" || payload.version !== version || payload.artifact?.sha256 !== sha256 || payload.artifact?.size !== statSync(file).size) process.exit(1);
            if (process.env.HQBASE_ARTIFACT_EXISTS !== "true") {
              const expected = JSON.parse(readFileSync("release/stable.json", "utf8"));
              if (expected.payload !== envelope.payload || expected.signature !== envelope.signature) process.exit(1);
              const local = `release/community-${version}.tar.gz`;
              if (createHash("sha256").update(readFileSync(local)).digest("hex") !== sha256 || statSync(local).size !== statSync(file).size) process.exit(1);
            }
          '
